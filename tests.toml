#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/tests.v1.schema.json

test_format = 1.0

[default]

    # -------------------------------
    # Default args to use for install
    # -------------------------------

    args.init_main_permission = "all_users"
    args.enable_sso = true

    test_change_url = true

    test_upgrade_from.d00411b.name = "Upgrade from first enable_sso commit"

[no_sso]

    args.init_main_permission = "all_users"
    args.enable_sso = false

[root_path]

    args.init_main_permission = "all_users"
    args.enable_sso = true
    args.path = "/"
