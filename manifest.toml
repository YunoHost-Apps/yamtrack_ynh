#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "yamtrack"
name = "Yamtrack"
description.en = "Media tracker for movies, TV shows, anime, manga, games, books and more"
description.fr = "Suivi de médias pour films, séries, anime, manga, jeux, livres et plus"

version = "0.25.2~ynh1"

maintainers = ["gmanaud"]

[upstream]
license = "AGPL-3.0-or-later"
demo = "https://yamtrack.fuzzygrim.com"
code = "https://github.com/FuzzyGrim/Yamtrack"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = true

disk = "100M"
ram.build = "300M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/yamtrack"

    [install.init_main_permission]
    type = "group"
    default = "all_users"

    [install.admin]
    type = "user"

    [install.enable_sso]
    type = "boolean"
    default = true
    ask.en = "Enable SSO authentication via Dex (OIDC)?"
    ask.fr = "Activer l'authentification SSO via Dex (OIDC) ?"
    help.en = "If enabled and Dex is installed, users will authenticate via YunoHost SSO. Otherwise, Yamtrack uses its own local authentication. Dex must be installed separately: https://apps.yunohost.org/app/dex"
    help.fr = "Si activé et que Dex est installé, les utilisateurs s'authentifieront via le SSO YunoHost. Sinon, Yamtrack utilisera son propre système d'authentification locale. Dex doit être installé séparément : https://apps.yunohost.org/app/dex"

[resources]
    [resources.sources.main]
    url = "https://github.com/FuzzyGrim/Yamtrack/archive/refs/tags/v0.25.2.tar.gz"
    sha256 = "ef434ebe5fcb6fc5edd015aeb438619674c3864147fac0e132ea14af1334b133"
    autoupdate.strategy = "latest_github_release"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 8095

    [resources.apt]
    packages = "python3, python3-dev, python3-pip, python3-venv, libpq-dev, postgresql, postgresql-contrib, redis-server"

    [resources.database]
    type = "postgresql"
