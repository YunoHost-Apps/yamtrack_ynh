#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "yamtrack"
name = "Yamtrack"
description.en = "Self-hosted media tracker for movies, TV shows, anime, manga, games, books and more"
description.fr = "Suivi de médias auto-hébergé pour films, séries, anime, manga, jeux, livres et plus"

version = "0.25.0~ynh1"

maintainers = []

[upstream]
license = "AGPL-3.0-or-later"
website = "https://github.com/FuzzyGrim/Yamtrack"
demo = "https://yamtrack.fuzzygrim.com"
code = "https://github.com/FuzzyGrim/Yamtrack"

[integration]
yunohost = ">= 12"
helpers_version = "2.1"
architectures = "all"
multi_instance = true
ldap = false
sso = true
disk = "100M"
ram.build = "300M"
ram.runtime = "200M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/yamtrack"

    [install.init_main_permission]
    type = "group"
    default = "all_users"

    [install.admin]
    type = "user"

[resources]
    [resources.sources.main]
    url = "https://github.com/FuzzyGrim/Yamtrack/archive/refs/tags/v0.25.0.tar.gz"
    sha256 = "aaf6b5ce228560216f1c77b765766aa2adbf83d6baaf62c8e30259cb2654a579"
    autoupdate.strategy = "latest_github_release"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
    main.default = 8095

    [resources.apt]
    packages = "python3, python3-dev, python3-pip, python3-venv, libpq-dev, postgresql, postgresql-contrib, redis-server"

    [resources.database]
    type = "postgresql"
